name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build macOS
        run: |
          cd lesson-cap
          npm install --prefix frontend
          wails build -platform darwin/universal -clean
      - name: Sign and Package
        run: |
          cd lesson-cap/build/bin
          codesign --force --deep --sign - LessonCap.app
          zip -r LessonCap_macOS.zip LessonCap.app
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lesson-cap/build/bin/LessonCap_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Windows
        run: |
          cd lesson-cap
          npm install --prefix frontend
          wails build -platform windows/amd64 -clean
      - name: Package
        run: |
          cd lesson-cap/build/bin
          Compress-Archive -Path LessonCap.exe -DestinationPath LessonCap_Windows.zip
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lesson-cap/build/bin/LessonCap_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
